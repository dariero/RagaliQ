name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded in-progress runs for the same branch/PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# CI installs from the committed PEP 751 pylock.toml via uv (deterministic,
# cached). hatch dep sync is avoided: its locked sync exits non-zero on a fresh
# environment, while uv consumes the same lockfile reliably.
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "pylock.toml"

      - name: Install locked dependencies + project
        run: |
          uv venv --python 3.14
          uv pip sync pylock.toml
          uv pip install -e . --no-deps

      - name: Run ruff
        run: .venv/bin/ruff check src/ tests/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "pylock.toml"

      - name: Install locked dependencies + project
        run: |
          uv venv --python 3.14
          uv pip sync pylock.toml
          uv pip install -e . --no-deps

      - name: Run mypy
        run: .venv/bin/mypy src/

  # Only unit tests run in CI; integration tests need live API keys.
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14"]
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "pylock.toml"

      - name: Install locked dependencies + project
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip sync pylock.toml
          uv pip install -e . --no-deps

      - name: Run unit tests
        # --cov-report=xml writes coverage.xml for the Codecov upload below.
        run: .venv/bin/pytest tests/unit/ --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7.0.0
        with:
          files: ./coverage.xml
          # fail_ci_if_error: false keeps CI green even if Codecov is down.
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
